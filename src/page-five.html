<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Login</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 pt-4 pb-2 text-white text-sm font-semibold">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
      </div>
    </div>

    <!-- Logo -->
    <div class="flex justify-center mt-20">
      <div class="w-40 h-40 sm:w-48 sm:h-48 rounded-full bg-white flex flex-col items-center justify-center gap-2 shadow-2xl">
        <img src="/assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="">
      </div>
    </div>

    <!-- Already have account -->
    <div class="text-center mt-8 px-6">
      <p class="text-white text-sm sm:text-base font-medium">Already have an account ?</p>
      <a href="#" class="text-yellow-400 text-sm sm:text-base font-semibold hover:underline">Login AgroFarm</a>
    </div>

    <!-- Don't have account -->
    <div class="text-center mt-20 px-6">
      <p class="text-white text-sm sm:text-base font-medium">
        Don't have account ?&nbsp;
        <a href="page-six.html" class="text-yellow-400 font-semibold hover:underline">Register now</a>
      </p>
    </div>


    <!-- Username Input + Login Button -->
    <div class="flex flex-col items-center gap-5 px-8 sm:px-20 mb-12 mt-10">

      <!-- Input field -->
      <div class="w-full flex items-center bg-white/20 backdrop-blur-sm border border-white/30 rounded-full px-5 py-3.5 gap-3">
        <input
          type="text"
          placeholder="User Name"
          class="flex-1 bg-transparent text-white placeholder-white/70 text-sm sm:text-base outline-none font-medium"
        />
        <!-- Person + check icon -->
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="8" r="4"/>
          <path d="M3 22c0-4.4 3.6-8 8-8"/>
          <path d="M17 17l2 2 4-4"/>
        </svg>
      </div>

      <!-- Login Button -->
      <a href="page-six.html" class="bg-yellow-400 text-gray-900 font-bold text-base sm:text-lg rounded-full mt-20 px-12 py-3.5 flex items-center gap-3 shadow-lg hover:brightness-105 transition-all">
        Login
        <!-- Arrow right icon -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 11h12M13 7l4 4-4 4"/>
        </svg>
      </a>

    </div>


    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Home Indicator -->
    <div class="flex justify-center pb-3">
      <div class="w-28 h-1 bg-white/40 rounded-full"></div>
    </div>

  </div>

</body>
</html>
