<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Product Detail</title>
  <link rel="stylesheet" href="output.css">
</head>

<body class="font-poppins bg-white">

  <div class="w-full min-h-screen flex flex-col">

    <!-- Top image area -->
    <div class="relative bg-white px-6 pt-5 pb-4 flex flex-col">


      <!-- Back arrow -->
      <a href="dealer-dash.html" class="mb-4 text-gray-800 hover:opacity-70 transition-opacity w-fit">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
      </a>

      <!-- Product Image -->
      <div class="flex justify-center items-center py-4">
        <img src="assets/WhatsApp Image 2026-02-25 at 16.13.15.jpeg" alt="NPK 15:15:15 Fertilizer Bag"
          class="w-64 h-64 sm:w-72 sm:h-72 object-contain drop-shadow-xl" />
      </div>
    </div>

    <!-- Detail card -->
    <div class="animate-fadeUp flex-1 bg-agro-bg rounded-t-3xl px-6 pt-20 pb-6 flex flex-col gap-4">

      <!-- Product name -->
      <h1 class="text-gray-900 font-extrabold text-2xl sm:text-3xl">NPK -15:15:15</h1>

      <!-- Description -->
      <p class="text-gray-600 text-sm sm:text-base leading-relaxed pt-10">
        NPK Prime 18:06:18+S+Mg Fertilizer For Vegetables Fruits and Flowers 100g 200g 500g 1kg
      </p>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Quantity + Price row -->
      <div class="animate-fadeUpD1 flex items-center justify-between">
        <!-- Quantity control -->
        <div class="flex items-center gap-4">
          <button
            class="w-8 h-8 rounded-full border-2 border-gray-400 flex items-center justify-center text-gray-600 hover:border-green-500 hover:text-green-500 transition-colors font-bold text-lg">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round">
              <line x1="2" y1="7" x2="12" y2="7" />
            </svg>
          </button>
          <span id="qty" class="text-gray-900 font-bold text-base sm:text-lg w-5 text-center">01</span>
          <button
            class="w-8 h-8 rounded-full border-2 border-gray-400 flex items-center justify-center text-gray-600 hover:border-agro-green-mid hover:text-agro-green-mid transition-colors font-bold text-lg">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round">
              <line x1="2" y1="7" x2="12" y2="7" />
              <line x1="7" y1="2" x2="7" y2="12" />
            </svg>
          </button>
        </div>
        <!-- Price -->
        <span id="price" class="text-gray-900 font-extrabold text-xl sm:text-2xl">RS.1500/=</span>
      </div>

      <!-- Action buttons -->
      <div class="flex gap-3 mt-2">
        <a href="payment.html"
          class="flex-1 bg-green-500 text-white font-bold text-sm sm:text-base rounded-xl py-3.5 text-center hover:bg-agro-green transition-colors shadow">
          Buy Now
        </a>
        <a href="#"
          class="flex-1 bg-olive-800 text-white font-bold text-sm sm:text-base rounded-xl py-3.5 text-center hover:opacity-90 transition-opacity shadow">
          Add to Cart
        </a>
      </div>

    </div>


  </div>

  <script>
    function updatePrice() {
      const qty = parseInt(document.getElementById('qty').textContent);
      const total = qty * 1500;
      document.getElementById('price').textContent = 'RS.' + total.toLocaleString() + '/=';
    }
  </script>

</body>

</html>
