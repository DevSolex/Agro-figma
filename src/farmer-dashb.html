<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Dashboard</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins bg-agro-bg">

  <div class="w-full min-h-screen flex flex-col">

    <!-- Hero Header -->
    <div class="relative bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center px-6 pt-4 pb-8">

      <!-- Greeting + Avatar -->
      <div class="flex items-center justify-between mt-20">
        <div>
          <h1 class="text-white font-extrabold text-3xl sm:text-4xl leading-tight">Hi , Solex</h1>
          <p class="text-white/80 font-semibold text-xl sm:text-2xl mt-0.5">Dashboard</p>
        </div>
        <!-- Avatar circle -->
        <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-white border-2 border-white/60 flex items-center justify-center shadow-lg flex-shrink-0">
          <img src="assets/WhatsApp Image 2026-02-25 at 13.43.28.jpeg" alt="" class="rounded-full">
        </div>
      </div>
    </div>

    <!-- Main content area -->
    <div class="flex-1 bg-agro-bg px-5 py-6 flex flex-col gap-5 relative">

      <!-- Watermark logo faint background -->
      <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none select-none">
        <svg class="w-72 h-72" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="18" r="8" fill="#1a5c2a"/>
          <path d="M42 56 Q22 44 28 28 Q38 36 42 56Z" fill="#1a5c2a"/>
          <path d="M42 56 Q62 44 56 28 Q46 36 42 56Z" fill="#1a5c2a"/>
          <path d="M42 56 Q38 68 42 78 Q46 68 42 56Z" fill="#1a5c2a"/>
        </svg>
      </div>

      <!-- Search Bar -->
      <div class="relative z-10 mt-10">
        <div class="w-full bg-yellow-400 rounded-2xl flex items-center px-5 py-3.5 gap-3 shadow">
          <input
            type="text"
            placeholder="Search here..."
            class="flex-1 bg-transparent text-gray-800 placeholder-gray-700/80 text-sm sm:text-base font-medium outline-none"
          />
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/>
            <path d="M16 16l5 5"/>
          </svg>
        </div>
      </div>

      <!-- Grid Menu -->
      <div class="grid grid-cols-2 gap-6 relative z-10 mt-10">

        <!-- Articles -->
        <a href="#" class="bg-white rounded-2xl border border-gray-400 flex flex-col items-center justify-center py-6 gap-3 shadow-sm hover:shadow-md transition-shadow">
          <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-green-500 flex items-center justify-center">
            <svg class="w-8 h-8 sm:w-9 sm:h-9" viewBox="0 0 36 36" fill="none">
              <path d="M18 8 L18 8" stroke="white" stroke-width="0"/>
              <!-- House icon -->
              <path d="M6 16 L18 6 L30 16 L30 30 L6 30 Z" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
              <rect x="13" y="20" width="10" height="10" rx="1" fill="#16a34a"/>
              <path d="M6 16 L18 6 L30 16" stroke="#15803d" stroke-width="2" fill="none" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm sm:text-base">Articles</span>
        </a>

        <!-- Market -->
        <a href="market-place.html" class="bg-white rounded-2xl border border-gray-400 flex flex-col items-center justify-center py-6 gap-3 shadow-sm hover:shadow-md transition-shadow">
          <div class="w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center">
            <svg class="w-12 h-12 sm:w-14 sm:h-14" viewBox="0 0 56 56" fill="none">
              <!-- Market stall roof stripes -->
              <rect x="6" y="10" width="44" height="12" rx="2" fill="#ef4444"/>
              <rect x="6" y="10" width="9" height="12" fill="#ef4444"/>
              <rect x="15" y="10" width="9" height="12" fill="#fca5a5"/>
              <rect x="24" y="10" width="9" height="12" fill="#ef4444"/>
              <rect x="33" y="10" width="9" height="12" fill="#fca5a5"/>
              <rect x="42" y="10" width="8" height="12" rx="2" fill="#ef4444"/>
              <!-- Front of stall -->
              <rect x="10" y="22" width="36" height="22" rx="2" fill="#fbbf24"/>
              <!-- Window / bag -->
              <rect x="20" y="26" width="16" height="14" rx="3" fill="white"/>
              <path d="M24 26 Q28 22 32 26" stroke="#d97706" stroke-width="1.8" fill="none"/>
              <!-- Handle -->
              <path d="M26 33 L30 33" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm sm:text-base">Market</span>
        </a>

        <!-- Guide -->
        <a href="#" class="bg-white rounded-2xl border border-gray-400 flex flex-col items-center justify-center py-6 gap-3 shadow-sm hover:shadow-md transition-shadow">
          <div class="w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center">
            <svg class="w-12 h-12 sm:w-14 sm:h-14" viewBox="0 0 56 56" fill="none">
              <!-- Book body -->
              <rect x="10" y="8" width="28" height="38" rx="3" fill="#92400e"/>
              <rect x="10" y="8" width="6" height="38" rx="3" fill="#78350f"/>
              <!-- Bookmark ribbon -->
              <path d="M32 8 L32 20 L28 16 L24 20 L24 8 Z" fill="#fbbf24"/>
              <!-- Figure on book -->
              <circle cx="24" cy="22" r="4" fill="#fbbf24"/>
              <path d="M18 34 Q18 28 24 26 Q30 28 30 34" fill="#fbbf24"/>
              <!-- Pencils sticking out -->
              <rect x="35" y="14" width="4" height="22" rx="2" fill="#ef4444" transform="rotate(15 37 25)"/>
              <rect x="38" y="12" width="4" height="22" rx="2" fill="#3b82f6" transform="rotate(20 40 23)"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm sm:text-base">Guide</span>
        </a>

        <!-- Reports -->
        <a href="#" class="bg-white rounded-2xl border border-gray-400 flex flex-col items-center justify-center py-6 gap-3 shadow-sm hover:shadow-md transition-shadow">
          <div class="w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center">
            <svg class="w-12 h-12 sm:w-14 sm:h-14" viewBox="0 0 56 56" fill="none">
              <!-- Clipboard board -->
              <rect x="10" y="12" width="36" height="38" rx="3" fill="#fbbf24"/>
              <!-- Clip -->
              <rect x="20" y="8" width="16" height="8" rx="4" fill="#d97706"/>
              <rect x="22" y="10" width="12" height="4" rx="2" fill="#fbbf24"/>
              <!-- Check lines -->
              <rect x="18" y="24" width="20" height="2.5" rx="1" fill="white"/>
              <rect x="18" y="31" width="20" height="2.5" rx="1" fill="white"/>
              <rect x="18" y="38" width="12" height="2.5" rx="1" fill="white"/>
              <!-- Checkmarks -->
              <path d="M14 25 L16 27 L20 23" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 32 L16 34 L20 30" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm sm:text-base">Reports</span>
        </a>

      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bg-white border-t border-gray-200 flex items-center justify-around px-6 py-3 shadow-lg">

      <!-- Home -->
      <a href="#" class="flex flex-col items-center text-gray-800 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5L13 3l10 7.5V22a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10.5z"/>
          <path d="M9 23V13h8v10"/>
        </svg>
      </a>

      <!-- Menu -->
      <a href="#" class="flex flex-col items-center text-gray-500 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="7" x2="23" y2="7"/>
          <line x1="3" y1="13" x2="23" y2="13"/>
          <line x1="3" y1="19" x2="23" y2="19"/>
        </svg>
      </a>

      <!-- Profile -->
      <a href="#" class="flex flex-col items-center text-gray-500 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13" cy="9" r="4"/>
          <path d="M5 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </a>

      <!-- Logout -->
      <a href="login.html" class="flex flex-col items-center text-gray-500 hover:text-red-500 transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 17l4-4-4-4"/>
          <path d="M21 13H10"/>
          <path d="M10 21H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/>
        </svg>
      </a>

    </div>

  </div>

</body>
</html>
