<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Welcome</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">

    <!-- Logo -->
    <div class="flex justify-center mt-20">
      <div class="w-36 h-36 rounded-full bg-white flex flex-col items-center justify-center gap-1.5">
        <img src="/assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="">
      </div>
    </div>

    <!-- Welcome Title -->
    <div class="text-center mt-6 px-6">
      <h1 class="font-extrabold text-yellow-400 text-4xl italic">
        Welcome To<br/>AgroFarm
      </h1>
    </div>

    <!-- Language Selector -->
    <div class="flex items-center justify-center gap-3 mt-5 text-white text-sm">
      <span class="font-medium">Choose Language</span>
      <svg width="18" height="14" viewBox="0 0 18 14" fill="white">
        <rect y="0" width="18" height="2" rx="1"/>
        <rect y="6" width="18" height="2" rx="1"/>
        <rect y="12" width="18" height="2" rx="1"/>
      </svg>
      <span class="font-medium">English</span>
      <span class="font-semibold underline underline-offset-2">Sinhala</span>
    </div>

    <!-- Role Selection Cards -->
    <div class="animate-fadeUpDelay flex justify-center gap-8 sm:gap-12 mt-8 px-8">

      <!-- Farmer -->
      <div class="flex flex-col items-center gap-3">
        <div class="w-24 h-24 rounded-full bg-white/90 flex items-center justify-center">
          <!-- Farmer icon -->
          <img src="/assets/WhatsApp Image 2026-02-25 at 13.43.27.jpeg" alt="" class="rounded-full">
        </div>
        <a href="farmer-signup.html" class="bg-yellow-400 text-gray-900 font-bold text-sm rounded-full px-8 py-2.5">
          Farmer
        </a>
      </div>

      <!-- Dealer -->
      <div class="flex flex-col items-center gap-3">
        <div class="w-24 h-24 rounded-full bg-white/90 flex items-center justify-center">
          <!-- Dealer icon -->
          <img src="assets/WhatsApp Image 2026-02-25 at 13.43.28.jpeg" alt="" class="rounded-full">
        </div>
        <a href="dealer-signup.html" class="bg-yellow-400 text-gray-900 font-bold text-sm rounded-full px-8 py-2.5">
          Dealer
        </a>
      </div>

    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Bottom tagline + CTA -->
    <div class="flex flex-col items-center gap-4 mb-8 px-8">
      <p class="text-white font-semibold text-sm text-center">
        We're popular in agriculture<br/>market globally
      </p>
      <a href="login.html" class="bg-yellow-400 text-gray-900 font-semibold text-sm rounded-full px-10 py-3">
        Discover More
      </a>
    </div>


  </div>

</body>
</html>
