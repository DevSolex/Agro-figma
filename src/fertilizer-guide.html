<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>AgroFarm – Fertilizer Guide</title>
  <link rel="stylesheet" href="output.css">
</head>

<body class="font-poppins">

  <div class="w-full min-h-screen flex flex-col">

    <!-- Hero Header -->
    <div class="relative bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center px-6 pt-4 pb-8">
    
      <h1 class="text-white font-extrabold text-4xl sm:text-5xl leading-tight mt-20">Fertilizer Guide</h1>
    </div>

    <!-- Form area -->
    <div class="flex-1 bg-agro-bg relative px-6 pt-10 pb-6 flex flex-col gap-6">

      <!-- Faint veggie/farm watermark pattern -->
      <div class="absolute inset-0 opacity-10 pointer-events-none select-none overflow-hidden">
        <svg class="absolute top-4 left-4 w-32 h-32" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="18" r="8" fill="#1a5c2a" />
          <path d="M42 56 Q22 44 28 28 Q38 36 42 56Z" fill="#1a5c2a" />
          <path d="M42 56 Q62 44 56 28 Q46 36 42 56Z" fill="#1a5c2a" />
          <path d="M42 56 Q38 68 42 78 Q46 68 42 56Z" fill="#1a5c2a" />
        </svg>
        <svg class="absolute bottom-20 right-4 w-28 h-28" viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="18" r="8" fill="#1a5c2a" />
          <path d="M42 56 Q22 44 28 28 Q38 36 42 56Z" fill="#1a5c2a" />
          <path d="M42 56 Q62 44 56 28 Q46 36 42 56Z" fill="#1a5c2a" />
        </svg>
        <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48" viewBox="0 0 90 90"
          fill="none">
          <circle cx="45" cy="45" r="40" stroke="#1a5c2a" stroke-width="1.5" fill="none" />
          <circle cx="45" cy="45" r="28" stroke="#1a5c2a" stroke-width="1" fill="none" />
        </svg>
      </div>

      <div class="flex flex-col gap-10 mb-10">
        <!-- Crop Name Dropdown -->
        <div class="relative z-10">
          <div
            class="w-full bg-green-500 rounded-xl px-5 py-4 flex items-center justify-between cursor-pointer shadow">
            <span class="text-white font-semibold text-base sm:text-lg">Crop Name</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
              <path d="M2 5l6 6 6-6" />
            </svg>
          </div>
        </div>

        <!-- Crop Week Dropdown -->
        <div class="relative z-10">
          <div
            class="w-full bg-green-500 rounded-xl px-5 py-4 flex items-center justify-between cursor-pointer shadow">
            <span class="text-white font-semibold text-base sm:text-lg">Crop Week</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
              <path d="M2 5l6 6 6-6" />
            </svg>
          </div>
        </div>

        <!-- Area Input -->
        <div class="relative z-10">
          <div class="w-full bg-green-500 rounded-xl px-5 py-4 flex items-center justify-between shadow">
            <span class="text-white font-semibold text-base sm:text-lg">Area</span>
            <div class="bg-gray-200 rounded-lg px-4 py-2 min-w-[80px]">
              <input type="text"
                class="bg-transparent text-gray-700 text-sm font-medium outline-none w-full text-center placeholder-gray-400"
                placeholder="___" />
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="animate-fadeUpD4 flex justify-center">
        <a href="fartilizer-guide2.html"
          class="bg-agro-yellow text-gray-900 font-bold text-base sm:text-lg rounded-xl px-16 py-3.5 border-2 border-agro-yellow shadow-lg hover:brightness-105 transition-all">
          Submit
        </a>
      </div>

    </div>

    <!-- Bottom Nav -->
    <div class="bg-white border-t border-gray-200 flex items-center justify-around px-6 py-3 shadow-lg">
      <a href="#" class="text-gray-800 hover:text-green-500 transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10.5L13 3l10 7.5V22a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10.5z" />
          <path d="M9 23V13h8v10" />

      <a href="#" class="text-gray-500 hover:text-agro-green transition-colors">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <line x1="3" y1="7" x2="23" y2="7" />
          <line x1="3" y1="13" x2="23" y2="13" />
          <line x1="3" y1="19" x2="23" y2="19" />

      <a href="#" class="text-gray-500 hover:text-green-500 transition-colors">

          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 17l4-4-4-4" />
          <path d="M21 13H10" />
          <path d="M10 21H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5" />
        </svg>
      </a>
    </div>

  </div>

</body>

</html>
