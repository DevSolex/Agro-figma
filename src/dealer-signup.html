<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Dealer Welcome</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">


    <!-- Header: Logo + Welcome -->
    <div class="animate-fadeDown flex items-center gap-3 px-6 mt-4">
      <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-white flex items-center justify-center flex-shrink-0 shadow-md">
        <img src="assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="Dealer Logo">
      </div>
      <h1 class="font-playfair font-extrabold text-agro-yellow text-4xl sm:text-5xl italic">Welcome !</h1>
    </div>

    <!-- Dealer icon circle -->
    <div class="animate-popIn flex justify-center mt-20">
      <div class="w-52 h-52 sm:w-60 sm:h-60 rounded-full bg-white border-4 border-white shadow-2xl flex items-center justify-center">
        <svg class="w-32 h-32 sm:w-36 sm:h-36" viewBox="0 0 120 120" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Cap -->
          <path d="M36 42 Q36 28 60 28 Q84 28 84 42"/>
          <rect x="32" y="40" width="56" height="6" rx="3"/>
          <!-- Head -->
          <circle cx="60" cy="58" r="14"/>
          <!-- Neck -->
          <path d="M52 70 L52 76 M68 70 L68 76"/>
          <!-- Collar / tie -->
          <path d="M46 76 L60 84 L74 76"/>
          <path d="M57 76 L60 90 L63 76"/>
          <!-- Body / apron/coat -->
          <rect x="40" y="76" width="40" height="30" rx="4"/>
          <!-- Badge/tag on chest -->
          <rect x="62" y="82" width="12" height="7" rx="2"/>
          <!-- Lapels -->
          <path d="M40 80 L50 76"/>
          <path d="M80 80 L70 76"/>
        </svg>
      </div>
    </div>

    <!-- Dealer label -->
    <div class="flex justify-center mt-10 mb-20">
      <div class="bg-green-500 text-gray-900 font-bold text-lg sm:text-xl px-14 py-3 rounded-xl shadow">
        Dealer
      </div>
    </div>


    <!-- Get Started button -->
    <div class="flex justify-center mb-10 mt-20">
      <a href="dealer-dash.html" class="bg-yellow-400 text-gray-900 font-bold text-base sm:text-lg rounded-full px-12 py-3.5 flex items-center gap-3 shadow-lg hover:brightness-105 transition-all">
        Get Started
        <span class="tracking-tighter text-xl font-extrabold">&raquo;</span>
      </a>
    </div>


    <!-- Spacer -->
    <div class="flex-1"></div>

  </div>

</body>
</html>
