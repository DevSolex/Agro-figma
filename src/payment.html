<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Payment</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins bg-agro-sage-bg">

  <div class="w-full min-h-screen flex flex-col px-5 pt-5 pb-6 gap-4">

    <!-- Header Card -->
    <div class="bg-gray-200 rounded-2xl px-5 py-5 shadow-sm">
      <a href="#" class="block mb-3 text-gray-800 hover:opacity-70 transition-opacity w-fit">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>
      <h1 class="text-gray-900 font-semibold text-xl sm:text-2xl text-center mb-10">Payment</h1>
    </div>

    <!-- Order Summary Card -->
    <div class="bg-gray-200 rounded-2xl px-5 py-5 shadow-sm flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <span class="text-gray-700 font-semibold text-sm sm:text-base">Price Amount</span>
        <span class="text-gray-900 font-semibold text-sm sm:text-base">Rs.1500/=</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-700 font-semibold text-sm sm:text-base">Category</span>
        <span class="text-gray-900 font-semibold text-sm sm:text-base">NPK -15</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-700 font-semibold text-sm sm:text-base">Delivery</span>
        <span class="text-gray-900 font-semibold text-sm sm:text-base">3 - 4 Day</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-gray-700 font-semibold text-sm sm:text-base">Seller</span>
        <span class="text-gray-900 font-semibold text-sm sm:text-base">Saman</span>
      </div>
    </div>

    <!-- Card Details Card -->
    <div class="animate-fadeUpD2 bg-gray-200 rounded-2xl px-5 py-5 shadow-sm flex flex-col gap-3">
      <!-- Header row with card logos -->
      <div class="flex items-center justify-between">
        <span class="text-gray-700 font-semibold text-sm sm:text-base">Enter Card Details</span>
        <div class="flex items-center gap-2">
          <!-- Visa logo -->
          <span class="font-extrabold text-blue-800 text-lg tracking-tight italic">VISA</span>
          <!-- Mastercard logo -->
          <div class="flex -space-x-2">
            <div class="w-7 h-7 rounded-full bg-red-500 opacity-90"></div>
            <div class="w-7 h-7 rounded-full bg-yellow-400 opacity-90"></div>
          </div>
        </div>
      </div>
      <!-- Total amount box -->
      <div class="bg-gray-100 rounded-xl px-4 py-4">
        <p class="text-gray-900 font-bold text-lg sm:text-xl">Total amount : 1500/=</p>
      </div>
    </div>

    <!-- Contact Seller -->
    <div class="animate-fadeUpD3 bg-gray-200 rounded-full px-6 py-4 shadow-sm flex items-center justify-between">
      <span class="text-gray-500 italic text-sm sm:text-base font-medium">Contact Seller</span>
      <!-- Phone icon -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4h5l2 5-3 2a13 13 0 0 0 7 7l2-3 5 2v5a2 2 0 0 1-2 2C10 24 4 18 4 6a2 2 0 0 1 2-2z"/>
        <!-- Small WiFi arc on phone indicating call -->
        <path d="M19 6 a6 6 0 0 1 0 8" stroke="#555" stroke-width="1.5" fill="none"/>
        <path d="M21.5 4 a9 9 0 0 1 0 12" stroke="#555" stroke-width="1.5" fill="none"/>
      </svg>
    </div>

    <div class="mt-10">
      <div class=""></div>
      <div class="px-4 py-3">
        <h2 class="text-gray-900 font-bold text-lg sm:text-xl">Free Shipping</h2>
        <p class="text-gray-600 text-sm sm:text-base">Your order qualifies for free shipping. Choose this option at checkout.</p>
      </div>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Pay Now Button -->
    <div class="animate-fadeUpD4">
      <a href="success.html" class="block w-full bg-orange-400 text-white font-bold text-base sm:text-lg rounded-full py-4 text-center shadow-lg hover:opacity-90 transition-opacity">
        Pay Now
      </a>
    </div>

  </div>

</body>
</html>
