<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Farmer Welcome</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 pt-4 pb-2 text-white text-sm font-semibold">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
      </div>
    </div>

    <!-- Header: Logo + Welcome -->
    <div class="flex items-center gap-3 px-6 mt-4">
      <!-- Small logo circle -->
      <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-white flex items-center justify-center flex-shrink-0 shadow-md">
        <img src="assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="">
      </div>
      <h1 class="font-playfair font-extrabold text-agro-yellow text-4xl sm:text-5xl italic">Welcome !</h1>
    </div>

    <!-- Farmer icon circle -->
    <div class="animate-popIn flex justify-center mt-20">
      <div class="w-52 h-52 sm:w-60 sm:h-60 rounded-full bg-gray-100 border-4 border-gray-200 shadow-2xl flex items-center justify-center">
        <svg class="w-36 h-36 sm:w-40 sm:h-40" viewBox="0 0 120 120" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Hat brim -->
          <ellipse cx="52" cy="36" rx="22" ry="5"/>
          <!-- Hat top -->
          <path d="M34 36 Q34 22 52 22 Q70 22 70 36"/>
          <!-- Head -->
          <circle cx="52" cy="50" r="12"/>
          <!-- Shirt collar V -->
          <path d="M40 68 L52 76 L64 68"/>
          <!-- Body / overalls -->
          <rect x="36" y="68" width="32" height="28" rx="4"/>
          <!-- Overalls straps -->
          <path d="M44 68 L44 60"/>
          <path d="M60 68 L60 60"/>
          <!-- Pocket -->
          <rect x="46" y="74" width="12" height="8" rx="2"/>
          <!-- Plant sprig (right side) -->
          <path d="M80 80 Q82 68 86 62" stroke="#2d7a3a" stroke-width="2"/>
          <path d="M83 70 Q88 66 90 70" stroke="#2d7a3a" stroke-width="2" fill="none"/>
          <path d="M85 62 Q90 58 92 62" stroke="#2d7a3a" stroke-width="2" fill="none"/>
          <!-- Leaf nodes -->
          <circle cx="86" cy="62" r="1.5" fill="#2d7a3a" stroke="none"/>
          <circle cx="83" cy="70" r="1.5" fill="#2d7a3a" stroke="none"/>
        </svg>
      </div>
    </div>

    <!-- Farmer label -->
    <div class="animate-fadeUp flex justify-center mt-10 mb-10">
      <div class="bg-green-500 text-gray-900 font-bold text-lg sm:text-xl px-14 py-3 rounded-xl shadow">
        Farmer
      </div>
    </div>


    <!-- Get Started button -->
    <div class="animate-fadeUpDelay flex justify-center mb-10 mt-20">
      <a href="page-twelve.html" class="bg-yellow-400 text-gray-900 font-bold text-base sm:text-lg rounded-full px-12 py-3.5 flex items-center gap-3 shadow-lg hover:brightness-105 transition-all">
        Get Started
        <span class="tracking-tighter text-xl font-extrabold">&raquo;</span>
      </a>
    </div>


    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Home Indicator -->
    <div class="flex justify-center pb-3">
      <div class="w-28 h-1 bg-white/40 rounded-full"></div>
    </div>

  </div>

</body>
</html>
