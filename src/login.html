<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Login</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">

    <!-- Logo -->
    <div class="flex justify-center mt-20">
      <div class="w-40 h-40 sm:w-48 sm:h-48 rounded-full bg-white flex flex-col items-center justify-center gap-2 shadow-2xl">
        <img src="/assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="">
      </div>
    </div>

    <!-- Don't have account -->
    <div class="text-center mt-20 px-6">
      <p class="text-white text-sm sm:text-base font-medium">
        Don't have account ?&nbsp;
        <a href="signup.html" class="text-yellow-400 font-semibold hover:underline">Register now</a>
      </p>
    </div>


    <!-- Username Input + Login Button -->
    <div class="flex flex-col items-center gap-5 px-8 sm:px-20 mb-12 mt-10">

      <!-- Input field -->
      <div class="w-full flex items-center bg-white/20 backdrop-blur-sm border border-white/30 rounded-full px-5 py-3.5 gap-3">
        <input
          type="text"
          placeholder="User Name"
          class="flex-1 bg-transparent text-white placeholder-white/70 text-sm sm:text-base outline-none font-medium"
        />
        <!-- Person + check icon -->
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="8" r="4"/>
          <path d="M3 22c0-4.4 3.6-8 8-8"/>
          <path d="M17 17l2 2 4-4"/>
        </svg>
      </div>

      <!-- Login Button -->
      <a href="farmer-dashb.html" class="bg-yellow-400 text-gray-900 font-bold text-base sm:text-lg rounded-full mt-20 px-12 py-3.5 flex items-center gap-3 shadow-lg hover:brightness-105 transition-all">
        Login
        <!-- Arrow right icon -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 11h12M13 7l4 4-4 4"/>
        </svg>
      </a>

    </div>


    <!-- Spacer -->
    <div class="flex-1"></div>


  </div>

</body>
</html>
