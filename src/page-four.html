<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Welcome</title>
  <link rel="stylesheet" href="output.css">
</head>
<body class="font-poppins">

  <div class="w-full min-h-screen bg-[url('/assets/WhatsApp%20Image%202026-02-25%20at%2013.44.10.jpeg')] bg-cover bg-center flex flex-col">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 pt-4 pb-2 text-white text-sm font-semibold">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/><path d="M3.5 6.5a6.5 6.5 0 0 1 9 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M1 4A9.9 9.9 0 0 1 15 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M23.5 4.5v4a2 2 0 0 0 0-4z" fill="white"/></svg>
      </div>
    </div>

    <!-- Logo -->
    <div class="animate-popIn flex justify-center mt-20">
      <div class="w-36 h-36 sm:w-40 sm:h-40 rounded-full bg-white flex flex-col items-center justify-center gap-1.5 shadow-2xl">
        <img src="/assets/WhatsApp_Image_2026-02-25_at_13.43.27_1_-removebg-preview.png" alt="">
      </div>
    </div>

    <!-- Welcome Title -->
    <div class="text-center mt-6 px-6">
      <h1 class="font-playfair font-extrabold text-agro-yellow text-4xl sm:text-5xl leading-tight italic">
        Welcome To<br/>AgroFarm
      </h1>
    </div>

    <!-- Language Selector -->
    <div class="flex items-center justify-center gap-3 mt-5 text-white text-sm sm:text-base">
      <span class="font-medium">Choose Language</span>
      <svg width="18" height="14" viewBox="0 0 18 14" fill="white">
        <rect y="0" width="18" height="2" rx="1"/>
        <rect y="6" width="18" height="2" rx="1"/>
        <rect y="12" width="18" height="2" rx="1"/>
      </svg>
      <span class="font-medium">English</span>
      <span class="font-semibold underline underline-offset-2">Sinhala</span>
    </div>

    <!-- Role Selection Cards -->
    <div class="animate-fadeUpDelay flex justify-center gap-8 sm:gap-12 mt-8 px-8">

      <!-- Farmer -->
      <div class="flex flex-col items-center gap-3">
        <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-white/90 flex items-center justify-center shadow-lg">
          <!-- Farmer icon -->
          <img src="/assets/WhatsApp Image 2026-02-25 at 13.43.27.jpeg" alt="" class="rounded-full">
        </div>
        <a href="page-five.html" class="bg-yellow-400 text-gray-900 font-bold text-sm sm:text-base rounded-full px-8 py-2.5 shadow hover:brightness-105 transition-all">
          Farmer
        </a>
      </div>

      <!-- Dealer -->
      <div class="flex flex-col items-center gap-3">
        <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-white/90 flex items-center justify-center shadow-lg">
          <!-- Dealer icon -->
          <img src="assets/WhatsApp Image 2026-02-25 at 13.43.28.jpeg" alt="" class="rounded-full">
        </div>
        <a href="page-five.html" class="bg-yellow-400 text-gray-900 font-bold text-sm sm:text-base rounded-full px-8 py-2.5 shadow hover:brightness-105 transition-all">
          Dealer
        </a>
      </div>

    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Bottom tagline + CTA -->
    <div class="flex flex-col items-center gap-4 mb-8 px-8">
      <p class="text-white font-semibold text-sm sm:text-base text-center">
        We're popular in agriculture<br/>market globally
      </p>
      <a href="page-five.html" class="bg-yellow-400 text-gray-900 font-semibold text-sm sm:text-base rounded-full px-10 py-3 shadow-lg hover:brightness-105 transition-all">
        Discover More
      </a>
    </div>

    <!-- Home Indicator -->
    <div class="flex justify-center pb-3">
      <div class="w-28 h-1 bg-white/40 rounded-full"></div>
    </div>

  </div>

</body>
</html>
